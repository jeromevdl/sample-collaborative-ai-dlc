name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe what you need and why.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of the project does this relate to?
      options:
        - Frontend
        - Backend (Lambda)
        - Infrastructure (Terraform)
        - Agents / AI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Examples, references, or anything that helps explain the request.
    validations:
      required: false
